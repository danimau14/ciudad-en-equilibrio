<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión – Ciudad en Equilibrio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="pantalla-form">
    <div class="form-container">
        <div class="form-header">
            <h2>🔑 Iniciar Sesión</h2>
            <p>Ingresa con tu grupo para continuar</p>
        </div>

        {% if error %}
        <div class="alerta alerta-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="campo-form">
                <label for="nombre_grupo">👥 Nombre del Grupo</label>
                <input
                    type="text"
                    id="nombre_grupo"
                    name="nombre_grupo"
                    placeholder="Nombre del grupo"
                    required
                >
            </div>

            <div class="campo-form">
                <label for="password">🔒 Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Contraseña"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primario btn-full">
                Entrar al Juego →
            </button>
        </form>

        <div class="form-footer">
            <p>¿No tienes cuenta? <a href="{{ url_for('registro') }}">Registrar grupo</a></p>
            <a href="{{ url_for('index') }}" class="link-volver">← Volver al inicio</a>
        </div>
    </div>
</body>
</html>
